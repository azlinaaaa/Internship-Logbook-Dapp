<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Log | Future Tech</title>
    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- Google Fonts (Poppins) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #2e1042 100%);
            --primary-glow: #06b6d4;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }

        /* Glassmorphism Form Container */
        .form-container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: border-color 0.3s;
        }

        .form-container:hover {
            border-color: rgba(6, 182, 212, 0.2);
        }

        .form-header h2 {
            font-weight: 600;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-header p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        /* Input Labels */
        .form-label-custom {
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Modern Futuristic Inputs */
        .form-control-custom {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ffffff !important;
            padding: 0.8rem 1.2rem;
            transition: all 0.3s ease;
        }

        .form-control-custom:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary-glow);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.3);
            outline: none;
        }

        .form-control-custom::placeholder {
            color: #475569;
        }

        /* Textarea specific resize constraint */
        textarea.form-control-custom {
            resize: none;
        }

        /* Buttons Styling */
        .btn-custom {
            border-radius: 12px;
            padding: 0.8rem 1.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit {
            background: linear-gradient(90deg, var(--primary-glow), #3b82f6);
            border: none;
            color: white;
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.2);
        }

        .btn-submit:hover {
            background: linear-gradient(90deg, #22d3ee, #2563eb);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(6, 182, 212, 0.4);
            color: white;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Blockchain Security Footer Notice */
        .security-notice {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 1rem;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="form-container">

        <!-- Header -->
        <div class="form-header text-center mb-4">
            <h2><i class="bi bi-folder-plus text-info"></i> Submit Internship Log</h2>
            <p>Your entry will be automatically hashed and secured onto the Stellar Blockchain.</p>
        </div>

        <!-- Form -->
        <form method="POST">

            <!-- Title Input -->
            <div class="mb-3">
                <label class="form-label-custom"><i class="bi bi-bookmark-star"></i> Task Title</label>
                <input type="text"
                       name="title"
                       class="form-control form-control-custom"
                       placeholder="e.g., Developed UI interfaces / Database integration"
                       required
                       autocomplete="off">
            </div>

            <!-- Content Input -->
            <div class="mb-4">
                <label class="form-label-custom"><i class="bi bi-pencil-square"></i> Log Content</label>
                <textarea name="content"
                          class="form-control form-control-custom"
                          rows="6"
                          placeholder="Describe your daily activities, tasks completed, or challenges faced..."
                          required></textarea>
            </div>

            <!-- Action Buttons -->
            <div class="row g-3">
                <div class="col-sm-6 order-sm-2">
                    <button type="submit" class="btn btn-custom btn-submit w-100">
                        <i class="bi bi-cloud-arrow-up"></i> Submit Log
                    </button>
                </div>
                <div class="col-sm-6 order-sm-1">
                    <a href="/dashboard" class="btn btn-custom btn-back w-100">
                        <i class="bi bi-arrow-left"></i> Cancel
                    </a>
                </div>
            </div>
        </form>

        <!-- Crypto Node Guard Text -->
        <div class="security-notice">
            <i class="bi bi-shield-lock-fill"></i>
            <span>SHA-256 Ledger Encryption & Stellar Network Synchronization Active</span>
        </div>

    </div>
</div>

</body>
</html>
