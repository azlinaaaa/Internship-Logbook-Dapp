<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Future Tech</title>
    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- Google Fonts (Poppins) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --primary-glow: #d946ef; /* Neon Pink untuk Register vibe */
            --secondary-glow: #6366f1; /* Indigo */
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Glow Background Effects */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.25;
            z-index: 0;
        }
        body::before { top: 15%; right: 15%; background: var(--primary-glow); }
        body::after { bottom: 15%; left: 15%; background: var(--secondary-glow); }

        /* Glassmorphism Card */
        .register-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            z-index: 10;
            transition: all 0.3s ease;
        }

        .register-container:hover {
            border-color: rgba(217, 70, 239, 0.3);
            box-shadow: 0 20px 40px rgba(217, 70, 239, 0.1);
        }

        .register-header h2 {
            color: #ffffff;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .register-header p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        /* Modern Input Fields */
        .form-control-custom {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ffffff !important;
            padding: 0.8rem 1.2rem;
            transition: all 0.3s ease;
        }

        .form-control-custom:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary-glow);
            box-shadow: 0 0 15px rgba(217, 70, 239, 0.4);
            outline: none;
        }

        .form-control-custom::placeholder {
            color: #64748b;
        }

        /* Futuristic Interactive Button */
        .btn-register {
            background: linear-gradient(90deg, var(--primary-glow), var(--secondary-glow));
            border: none;
            border-radius: 12px;
            color: #ffffff;
            font-weight: 600;
            padding: 0.8rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(217, 70, 239, 0.3);
        }

        .btn-register:hover {
            background: linear-gradient(90deg, #f472b6, #4f46e5);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(217, 70, 239, 0.5);
            color: #ffffff;
        }

        .btn-register:active {
            transform: translateY(0);
        }

        /* Extra Links */
        .form-footer {
            text-align: center;
            margin-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 1.2rem;
        }
        .form-footer p {
            color: #64748b;
            font-size: 0.85rem;
            margin-bottom: 0;
        }
        .form-footer a {
            color: #94a3b8;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .form-footer a:hover {
            color: var(--primary-glow);
        }
    </style>
</head>
<body>

<div class="register-container">
    <div class="register-header text-center mb-4">
        <h2><i class="bi bi-person-plus text-magic"></i> Create Account</h2>
        <p>Sign up to secure your internship logbook node</p>
    </div>

    <form method="POST">
        <div class="mb-3">
            <input type="text" name="username" class="form-control form-control-custom" placeholder="Choose Username" required autocomplete="off">
        </div>

        <div class="mb-4">
            <input type="password" name="password" class="form-control form-control-custom" placeholder="Create Password" required>
        </div>

        <button type="submit" class="btn btn-register w-100">Sign Up</button>
    </form>

    <div class="form-footer">
        <p>Already have an account? <a href="{{ url_for('login') }}">Sign In</a></p>
    </div>
</div>

</body>
</html>
